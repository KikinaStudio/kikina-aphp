<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kikina — Hopital</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #000000;
    --accent: #E8742A;
    --bar-off: #2E2E2E;
    --text: #FFFFFF;
    --text-dim: #999999;
    --muted: rgba(255,255,255,0.3);
    --pad: 6.15vw;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto auto auto;
    height: 100dvh;
    height: 100%;
    padding: 0 var(--pad);
    padding-top: calc(env(safe-area-inset-top, 44px) + 12px);
    padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 12px);
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1.4vh;
  }
  .top-left { display: flex; align-items: center; gap: 2.5vw; }
  .logo-wrap { position: relative; flex-shrink: 0; }
  .hospital-logo {
    width: 13.4vw; height: 12.5vw;
    max-width: 64px; max-height: 60px;
    border-radius: 50%; object-fit: cover; display: block;
  }
  .status-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); border: 2px solid var(--bg);
    transition: background 0.4s;
  }
  .status-dot.live { background: #4DA65B; }
  .status-dot.error { background: #D4534B; }
  .status-dot.reconnecting { background: var(--accent); animation: blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .room-label { font-size: clamp(14px, 4.1vw, 20px); font-weight: 500; }
  .play-btn {
    width: clamp(40px, 12.8vw, 64px); height: clamp(40px, 12.8vw, 64px);
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .play-btn svg { width: 100%; height: 100%; fill: var(--text); }
  .play-btn:active svg { fill: var(--accent); }
  .icon-pause { display: none; }
  .is-playing .icon-play { display: none; }
  .is-playing .icon-pause { display: block; }
  .bars-zone { display: flex; align-items: center; min-height: 0; }
  .bars-container {
    width: 100%;
    height: 92%;
    display: flex;
    align-items: stretch;
    gap: clamp(3px, 1.2vw, 7px);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  .bar { flex: 1; min-width: 0; border-radius: 2px; }
  .bar.active { background: var(--accent); }
  .bar.inactive { background: var(--bar-off); }
  .volume-display { padding: 1.6vh 0 0.7vh; }
  .volume-label {
    font-size: clamp(60px, 22.9vw, 130px);
    font-weight: 400;
    line-height: normal;
    color: var(--text);
  }
  .description { padding: 0.5vh 0 1.6vh; }
  .desc-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 131.25%;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .footer {
    display: flex;
    align-items: center;
    gap: clamp(12px, 4vw, 24px);
  }
  .btn-avis {
    flex: 1;
    background: none;
    border: 1px solid var(--muted);
    border-radius: 999px;
    color: var(--muted);
    font-size: clamp(12px, 3.6vw, 18px);
    font-weight: 400;
    font-family: 'Inter', sans-serif;
    padding: clamp(4px, 1.2vw, 7px) clamp(16px, 5vw, 32px);
    cursor: pointer;
    text-align: center;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-avis:active { border-color: var(--text); color: var(--text); }
  .fb-btn {
    position: relative;
    width: clamp(36px, 12vw, 60px);
    height: clamp(36px, 12vw, 60px);
    flex-shrink: 0;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .fb-btn svg {
    width: clamp(26px, 8.8vw, 44px);
    height: clamp(23px, 7.9vw, 40px);
    stroke: var(--muted); stroke-width: 1.5; fill: none;
    transition: all 0.2s;
  }
  .fb-btn:active svg { stroke: var(--text); }
  .fb-btn.flash-like svg { stroke: var(--accent); fill: var(--accent); }
  .fb-btn.flash-dislike svg { stroke: var(--text); }
  .badge {
    position: absolute;
    top: -2px; right: -4px;
    min-width: 18px; height: 18px;
    background: var(--accent);
    color: #fff;
    font-size: 11px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .badge.visible { opacity: 1; transform: scale(1); }
  .dislike .badge { background: var(--text-dim); }
  .toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    background: rgba(40,40,40,0.95);
    color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif;
    padding: 12px 24px; border-radius: 12px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 10; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  /* Feedback overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 20;
    padding: 24px;
  }
  .overlay.open { display: flex; }
  .overlay-title {
    font-size: 20px; font-weight: 500;
    color: var(--text); text-align: center;
  }
  .overlay-textarea {
    width: 100%; max-width: 400px;
    height: 120px;
    background: var(--bar-off);
    border: 1px solid var(--muted);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    padding: 14px;
    resize: none;
    outline: none;
  }
  .overlay-textarea:focus { border-color: var(--accent); }
  .overlay-textarea::placeholder { color: var(--text-dim); }
  .overlay-send {
    width: 100%; max-width: 400px;
    background: var(--accent);
    color: #fff; border: none;
    border-radius: 999px;
    font-size: 16px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .overlay-send:active { opacity: 0.7; }
  .overlay-send:disabled { opacity: 0.4; cursor: default; }
  .overlay-close {
    background: none; border: none;
    color: var(--text-dim); font-size: 14px;
    font-family: 'Inter', sans-serif;
    cursor: pointer; padding: 8px;
    margin-top: 4px;
  }
  @media (min-width: 768px) {
    .app { max-width: 500px; margin: 0 auto; }
  }
</style>
</head>

        <div class="status-dot" id="statusDot"></div>

      <span class="room-label" id="roomLabel">Salle de reveil</span>

    <button class="play-btn" id="playBtn" aria-label="Lecture / Pause">
      <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 0 0 1.53.85l11.18-7.36a1 1 0 0 0 0-1.7L9.53 4.29A1 1 0 0 0 8 5.14z"/></svg>

  <div class="bars-zone">

  <button class="overlay-send" id="avisSend">Envoyer</button>
  <button class="overlay-close" id="avisClose">Fermer</button>

<script>
(function() {
  // Room config based on URL path
  var ROOMS = {
    '/stream':  { name: 'Salle de reveil',  stream: 'https://radio.kikinalab.com/stream/main',    color: '#E8742A', room: 'salle_de_reveil',  desc: 'Ambiance sonore pensee pour accompagner le reveil des patients apres une intervention. Vous pouvez indiquer a tout moment si le son vous convient.' },
    '/repos':   { name: 'Salle de repos',    stream: 'https://radio.kikinalab.com/stream/repos',   color: '#4DA65B', room: 'salle_de_repos',   desc: 'Ambiance sonore pensee pour accompagner votre moment de repos. Vous pouvez indiquer a tout moment si le son vous convient.' },
    '/attente': { name: "Salle d'attente",   stream: 'https://radio.kikinalab.com/stream/attente', color: '#8B5CF6', room: 'salle_d_attente',  desc: 'Ambiance sonore pensee pour rendre votre attente plus agreable. Vous pouvez indiquer a tout moment si le son vous convient.' }
  };

  var path = window.location.pathname.replace(/\/$/, '') || '/stream';
  var config = ROOMS[path] || ROOMS['/stream'];

  // Apply room color
  document.documentElement.style.setProperty('--accent', config.color);
  document.title = 'Kikina — ' + config.name;
  document.getElementById('roomLabel').textContent = config.name;
  document.getElementById('descText').textContent = config.desc;

  var FEEDBACK_URL = '/api/feedback';
  var RADIO_STATUS_URL = 'https://radio.kikinalab.com/api/status';
  var STATUS_POLL_INTERVAL = 10000; // 10s
  var RECONNECT_DELAY = 3000;
  var MAX_RECONNECT = 10;
  var NUM_BARS = 9;
  var VOL_MIN = 0.3;  // base (0.5) minus 20%
  var VOL_MAX = 0.7;  // base (0.5) plus 20%

  var app = document.getElementById('app');
  var playBtn = document.getElementById('playBtn');
  var barsContainer = document.getElementById('barsContainer');
  var volumeLabel = document.getElementById('volumeLabel');
  var likeBtn = document.getElementById('likeBtn');
  var dislikeBtn = document.getElementById('dislikeBtn');
  var likeBadge = document.getElementById('likeBadge');
  var dislikeBadge = document.getElementById('dislikeBadge');
  var statusDot = document.getElementById('statusDot');
  var toastEl = document.getElementById('toast');
  var btnAvis = document.getElementById('btnAvis');
  var avisOverlay = document.getElementById('avisOverlay');
  var avisText = document.getElementById('avisText');
  var avisSend = document.getElementById('avisSend');
  var avisClose = document.getElementById('avisClose');
  var nowPlaying = document.getElementById('nowPlaying');
  var trackNameEl = document.getElementById('trackName');

  var audio = null, isPlaying = false;
  var volume = 0.5; // Normal = 50%
  var currentTrack = '';
  var reconnectCount = 0, reconnectTimer = null, toastTimer = null;

  // -------------------------------------------------------
  // Poll radio status to show current track
  // -------------------------------------------------------
  function pollStatus() {
    fetch(RADIO_STATUS_URL).then(function(r) { return r.json(); }).then(function(data) {
      if (data.currentTrack) {
        // Clean up filename: "Ambroise_Pare___J11.wav" → "Ambroise Pare - J11"
        currentTrack = data.currentTrack
          .replace(/\.[^.]+$/, '')        // remove extension
          .replace(/___/g, ' - ')         // triple underscore → dash
          .replace(/_/g, ' ');            // underscores → spaces
        trackNameEl.textContent = currentTrack;
        nowPlaying.style.opacity = '1';
      }
      if (data.playing) setStatusDot('live');
    }).catch(function() {});
  }
  pollStatus();
  setInterval(pollStatus, STATUS_POLL_INTERVAL);

  // Badge counters from localStorage (per room)
  var storageKey = 'kikina_counts_' + config.room;
  var counts = JSON.parse(localStorage.getItem(storageKey) || '{"like":0,"dislike":0}');
  function updateBadges() {
    likeBadge.textContent = counts.like;
    dislikeBadge.textContent = counts.dislike;
    if (counts.like > 0) likeBadge.classList.add('visible');
    if (counts.dislike > 0) dislikeBadge.classList.add('visible');
    localStorage.setItem(storageKey, JSON.stringify(counts));
  }
  updateBadges();

  // Bars
  for (var i = 0; i < NUM_BARS; i++) {
    var bar = document.createElement('div');
    bar.className = 'bar';
    barsContainer.appendChild(bar);
  }

  function getVolumeLabel(v) {
    if (v <= 0.35) return 'Bas';
    if (v <= 0.6) return 'Normal';
    return 'Fort';
  }

  function updateBars() {
    var ratio = (volume - VOL_MIN) / (VOL_MAX - VOL_MIN);
    var activeBars = Math.round(ratio * NUM_BARS);
    var bars = barsContainer.children;
    for (var i = 0; i < bars.length; i++) {
      bars[i].className = i < activeBars ? 'bar active' : 'bar inactive';
    }
    volumeLabel.textContent = getVolumeLabel(volume);
  }

  function setVolume(v) {
    volume = Math.max(VOL_MIN, Math.min(VOL_MAX, v));
    if (audio) audio.volume = volume;
    updateBars();
  }

  function volFromPointer(x) {
    var rect = barsContainer.getBoundingClientRect();
    var ratio = (x - rect.left) / rect.width;
    setVolume(VOL_MIN + ratio * (VOL_MAX - VOL_MIN));
  }

  barsContainer.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    barsContainer.setPointerCapture(e.pointerId);
    volFromPointer(e.clientX);
  });
  barsContainer.addEventListener('pointermove', function(e) {
    if (barsContainer.hasPointerCapture(e.pointerId)) volFromPointer(e.clientX);
  });
  barsContainer.addEventListener('pointerup', function(e) {
    barsContainer.releasePointerCapture(e.pointerId);
  });

  // -------------------------------------------------------
  // Audio playback (browser-side)
  //
  // TODO pour integration radio :
  // Remplacer cette section par des appels a l'API radio.
  // Ex: POST /api/play/{streamId}, POST /api/pause/{streamId}
  // Le volume devrait controler le volume de sortie du serveur
  // radio, pas le volume du navigateur.
  // Ex: POST /api/volume/{streamId} { volume: 0.5 }
  // -------------------------------------------------------
  function createAudio() {
    if (audio) { audio.pause(); audio.removeAttribute('src'); audio.load(); audio = null; }
    audio = new Audio();
    audio.volume = volume;
    audio.addEventListener('playing', function() {
      isPlaying = true; reconnectCount = 0;
      app.classList.add('is-playing'); setStatusDot('live');
    });
    audio.addEventListener('pause', function() {
      if (!audio.error) { isPlaying = false; app.classList.remove('is-playing'); setStatusDot('idle'); }
    });
    audio.addEventListener('error', function() {
      isPlaying = false; app.classList.remove('is-playing'); tryReconnect();
    });
    audio.addEventListener('stalled', function() { setStatusDot('reconnecting'); });
    audio.addEventListener('waiting', function() { setStatusDot('reconnecting'); });
  }

  function togglePlay() {
    if (isPlaying) { audio.pause(); return; }
    createAudio();
    audio.src = config.stream + '?t=' + Date.now();
    audio.play().catch(function() { setStatusDot('error'); });
  }

  function tryReconnect() {
    if (reconnectCount >= MAX_RECONNECT) { setStatusDot('error'); return; }
    reconnectCount++;
    setStatusDot('reconnecting');
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(function() {
      createAudio();
      audio.src = config.stream + '?t=' + Date.now();
      audio.play().catch(function() { tryReconnect(); });
    }, RECONNECT_DELAY);
  }

  function setStatusDot(state) {
    statusDot.className = 'status-dot';
    if (state === 'live') statusDot.classList.add('live');
    else if (state === 'error') statusDot.classList.add('error');
    else if (state === 'reconnecting') statusDot.classList.add('reconnecting');
  }

  // Feedback
  function formatTC(s) {
    var h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h > 0) return h+'h'+String(m).padStart(2,'0')+'m'+String(sec).padStart(2,'0')+'s';
    return m+'m'+String(sec).padStart(2,'0')+'s';
  }

  function sendFeedback(entry) {
    // localStorage fallback
    var logKey = 'kikina_feedback_' + config.room;
    var log = JSON.parse(localStorage.getItem(logKey) || '[]');
    log.push(entry);
    localStorage.setItem(logKey, JSON.stringify(log));

    // POST to API
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', FEEDBACK_URL, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.send(JSON.stringify(entry));
    } catch(e) {}

    console.log('[Kikina Feedback]', JSON.stringify(entry));
  }

  function recordFeedback(type) {
    var tc = audio && isPlaying ? Math.floor(audio.currentTime) : 0;
    var entry = {
      type: type,
      track: currentTrack || 'inconnu',
      timecode_seconds: tc,
      timecode_display: formatTC(tc),
      timestamp: new Date().toISOString(),
      room: config.room
    };

    counts[type]++;
    updateBadges();
    sendFeedback(entry);

    if (type === 'like') {
      flash(likeBtn, 'flash-like');
      showToast('Aime a ' + entry.timecode_display);
    } else {
      flash(dislikeBtn, 'flash-dislike');
      showToast('Pas convaincu a ' + entry.timecode_display);
    }
  }

  function flash(btn, cls) {
    btn.classList.add(cls);
    setTimeout(function() { btn.classList.remove(cls); }, 600);
  }

  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 1800);
  }

  // Avis overlay
  function openAvis() { avisOverlay.classList.add('open'); avisText.value = ''; avisText.focus(); }
  function closeAvis() { avisOverlay.classList.remove('open'); }
  function submitAvis() {
    var text = avisText.value.trim();
    if (!text) return;
    avisSend.disabled = true;
    var entry = {
      type: 'message',
      text: text,
      track: currentTrack || 'inconnu',
      timecode_seconds: audio && isPlaying ? Math.floor(audio.currentTime) : null,
      timecode_display: audio && isPlaying ? formatTC(Math.floor(audio.currentTime)) : null,
      timestamp: new Date().toISOString(),
      room: config.room
    };
    sendFeedback(entry);
    showToast('Merci pour votre retour !');
    avisSend.disabled = false;
    closeAvis();
  }

  // Events
  playBtn.addEventListener('click', togglePlay);
  likeBtn.addEventListener('click', function() { recordFeedback('like'); });
  dislikeBtn.addEventListener('click', function() { recordFeedback('dislike'); });
  btnAvis.addEventListener('click', openAvis);
  avisClose.addEventListener('click', closeAvis);
  avisSend.addEventListener('click', submitAvis);

  updateBars();
})();
</script>
</body>
</html>
